# ================== Project Identification ==================
sonar.projectKey=electronic-shop
sonar.projectName=electronic-shop
sonar.projectVersion=1.0

# ================== Organization ==================
sonar.organization=Harini2196

# ================== Sources ==================
# Analyze all HTML, CSS, and PHP files under the project
sonar.sources=.

# Optional: Exclude vendor or library directories if present
sonar.exclusions=vendor/**,node_modules/**

# ================== Language ==================
# SonarCloud detects PHP automatically, no need to specify HTML/CSS separately

# ================== Login / Authentication ==================
# Token generated in SonarCloud (replace with your actual token)
# sonar.login=YOUR_SONARCLOUD_TOKEN

# ================== Optional Settings ==================
# Encoding
sonar.sourceEncoding=UTF-8

# Optional: Specify file suffixes if needed
sonar.php.file.suffixes=.php
sonar.web.file.suffixes=.html,.css